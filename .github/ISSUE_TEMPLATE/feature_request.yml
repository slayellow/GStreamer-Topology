name: Feature Request
description: 새로운 기능이나 개선 요청을 등록합니다.
title: "[Feature] "
labels:
  - feature
body:
  - type: markdown
    attributes:
      value: |
        기능은 가능한 한 하나의 사용자 흐름으로 작게 작성해 주세요.
  - type: textarea
    id: problem
    attributes:
      label: 문제 또는 배경
      description: 어떤 불편함이나 필요에서 나온 요청인가요?
      placeholder: 예) 큰 pipeline에서 특정 branch를 빠르게 찾기 어렵습니다.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 원하는 동작
      description: 사용자가 무엇을 할 수 있어야 하나요?
      placeholder: 예) 노드 이름으로 검색하면 캔버스가 해당 노드로 이동하면 좋겠습니다.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: 완료 여부를 판단할 수 있는 체크 항목을 적어주세요.
      placeholder: |
        - [ ] 검색어를 입력할 수 있다
        - [ ] 검색 결과를 클릭하면 해당 노드로 이동한다
        - [ ] 결과가 없으면 한국어 안내가 표시된다
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - P0
        - P1
        - P2
        - P3
      default: 2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - Import
        - Parser
        - Canvas
        - Inspector
        - Diagnostics
        - Remote
        - Build
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 참고 자료
      description: 스크린샷, pipeline 예시, 관련 문서, 링크가 있으면 적어주세요.
