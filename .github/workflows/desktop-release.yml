name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example app-v0.1.0
        required: true
        default: app-v0.1.0
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: GStreamer Topology ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            GStreamer Topology desktop build.

            - macOS and Windows bundles are generated by GitHub Actions.
            - Current artifacts are unsigned and not notarized.
            - Use the matching installer or app bundle for your OS.
          releaseDraft: true
          prerelease: true
