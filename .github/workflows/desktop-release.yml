name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example app-v0.1.0
        required: true
        default: app-v0.1.0
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            bundles: app,dmg
          - name: Windows
            os: windows-latest
            bundles: nsis,msi
          - name: Linux
            os: ubuntu-latest
            bundles: appimage,deb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci --include=optional

      - name: Validate macOS team-distribution secrets
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=()
          for name in \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            KEYCHAIN_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing macOS signing/notarization secrets: %s\n' "${missing[*]}" >&2
            cat >&2 <<'EOF'
          macOS team-distribution artifacts must be Developer ID signed and Apple-notarized.
          Unsigned DMG builds are intentionally blocked because Gatekeeper reports them as
          damaged after browser download. Configure the missing repository secrets and rerun
          this workflow.
          EOF
            exit 1
          fi

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/gstreamer-topology-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[ "]//g')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          identity=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F\" '/Developer ID Application/ { print $2; exit }')
          if [ -z "$identity" ]; then
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            echo "Developer ID Application signing identity was not found in the imported certificate." >&2
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "Imported Developer ID signing identity: $identity"

      - name: Build signed/notarized macOS Tauri bundle
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri -- build --bundles ${{ matrix.bundles }}

      - name: Verify macOS signing and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name "*.app" -print -quit)
          dmg_path=$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name "*.dmg" -print -quit)

          if [ -z "$app_path" ] || [ -z "$dmg_path" ]; then
            find src-tauri/target/release/bundle -maxdepth 4 -print || true
            echo "Expected macOS .app and .dmg artifacts were not found." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign -dv --verbose=4 "$app_path" 2>&1 | tee "$RUNNER_TEMP/codesign-details.txt"
          if ! grep -q "Authority=Developer ID Application" "$RUNNER_TEMP/codesign-details.txt"; then
            echo "The macOS app is not signed with a Developer ID Application certificate." >&2
            exit 1
          fi

          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg_path"

      - name: Upload verified macOS bundle
        if: runner.os == 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "GStreamer Topology $RELEASE_TAG" \
              --notes "GStreamer Topology desktop build." \
              --draft \
              --prerelease

          shopt -s nullglob
          assets=(
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/dmg/*.dmg
          )
          if [ "${#assets[@]}" -eq 0 ]; then
            find src-tauri/target/release/bundle -maxdepth 4 -type f -print || true
            echo "No verified macOS release assets were found for upload." >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Build and upload Tauri bundle
        if: runner.os != 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles ${{ matrix.bundles }}
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: GStreamer Topology ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            GStreamer Topology desktop build.

            - macOS, Windows, and Linux bundles are generated by GitHub Actions.
            - macOS DMG artifacts are required to be Developer ID signed and Apple-notarized.
            - Windows and Linux artifacts are not code-signed yet.
            - Use the matching installer or app bundle for your OS.
          releaseDraft: true
          prerelease: true

      - name: Generate release checksums
        shell: bash
        run: |
          bundle_dir="src-tauri/target/release/bundle"
          checksum_file="$RUNNER_TEMP/SHA256SUMS-${{ matrix.name }}.txt"
          find "$bundle_dir" -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" \) -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > "$checksum_file"
          cat "$checksum_file"
          gh release upload "${{ github.event.inputs.tag || github.ref_name }}" "$checksum_file" --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Windows runtime bundle assumptions
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "src-tauri\target\release"
          $bundleDir = Join-Path $releaseDir "bundle"
          if (-not (Test-Path $bundleDir)) {
            throw "Tauri bundle directory was not created: $bundleDir"
          }

          $shadowedCommonControls = Get-ChildItem $bundleDir -Recurse -Filter "comctl32.dll" -ErrorAction SilentlyContinue
          if ($shadowedCommonControls) {
            $shadowedCommonControls | ForEach-Object { Write-Host $_.FullName }
            throw "Windows bundle must not ship comctl32.dll because it can shadow system Common Controls v6."
          }

          $exe = Get-ChildItem $releaseDir -Recurse -Filter "gstreamer-to-topology.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "Built Windows executable was not found under $releaseDir"
          }
          Write-Host "Windows executable: $($exe.FullName)"

          $mt = Get-Command mt.exe -ErrorAction SilentlyContinue
          if (-not $mt) {
            Write-Warning "mt.exe is not available on PATH; skipping embedded manifest extraction."
            exit 0
          }

          $manifest = Join-Path $env:RUNNER_TEMP "gstreamer-to-topology.manifest.xml"
          & $mt.Source "-inputresource:$($exe.FullName);#1" "-out:$manifest"
          $manifestText = Get-Content $manifest -Raw
          if ($manifestText -notmatch "Microsoft.Windows.Common-Controls") {
            throw "Embedded Windows manifest is missing the Common Controls v6 dependency."
          }
          Write-Host "Embedded Windows manifest contains Common Controls v6."

      - name: List generated bundles
        if: always()
        shell: bash
        run: find src-tauri/target/release/bundle -maxdepth 4 -type f -print || true
