name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example app-v0.1.0
        required: true
        default: app-v0.1.0
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            bundles: app,dmg
          - name: Windows
            os: windows-latest
            bundles: nsis,msi
          - name: Linux
            os: ubuntu-latest
            bundles: appimage,deb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci --include=optional

      - name: Build and upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles ${{ matrix.bundles }}
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: GStreamer Topology ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            GStreamer Topology desktop build.

            - macOS, Windows, and Linux bundles are generated by GitHub Actions.
            - Current artifacts are unsigned and not notarized.
            - Use the matching installer or app bundle for your OS.
          releaseDraft: true
          prerelease: true

      - name: Verify Windows runtime bundle assumptions
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "src-tauri\target\release"
          $bundleDir = Join-Path $releaseDir "bundle"
          if (-not (Test-Path $bundleDir)) {
            throw "Tauri bundle directory was not created: $bundleDir"
          }

          $shadowedCommonControls = Get-ChildItem $bundleDir -Recurse -Filter "comctl32.dll" -ErrorAction SilentlyContinue
          if ($shadowedCommonControls) {
            $shadowedCommonControls | ForEach-Object { Write-Host $_.FullName }
            throw "Windows bundle must not ship comctl32.dll because it can shadow system Common Controls v6."
          }

          $exe = Get-ChildItem $releaseDir -Recurse -Filter "gstreamer-to-topology.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "Built Windows executable was not found under $releaseDir"
          }
          Write-Host "Windows executable: $($exe.FullName)"

          $mt = Get-Command mt.exe -ErrorAction SilentlyContinue
          if (-not $mt) {
            Write-Warning "mt.exe is not available on PATH; skipping embedded manifest extraction."
            exit 0
          }

          $manifest = Join-Path $env:RUNNER_TEMP "gstreamer-to-topology.manifest.xml"
          & $mt.Source "-inputresource:$($exe.FullName);#1" "-out:$manifest"
          $manifestText = Get-Content $manifest -Raw
          if ($manifestText -notmatch "Microsoft.Windows.Common-Controls") {
            throw "Embedded Windows manifest is missing the Common Controls v6 dependency."
          }
          Write-Host "Embedded Windows manifest contains Common Controls v6."

      - name: List generated bundles
        if: always()
        shell: bash
        run: find src-tauri/target/release/bundle -maxdepth 4 -type f -print || true
